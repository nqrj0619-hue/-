    <meta name="description" content="一個在孤獨中誕生的品牌。
工作幾年後的某一個晚上，我突然意識到自己很孤單。

朋友在畢業後四散各地，休假跟作息也常常都不攏。我每天兩點一線，週末幾乎都只能宅在家追劇滑手機。

我就突然覺得，台北這麼大，卻有一種容不下我的感覺。

為此，我開始卯起來參加各種聚會，跟陌生人吃晚餐啦、讀書會啦、深度聊天聚會啦、桌遊派對啦⋯⋯

雖然沒有因此結識到親近的朋友，但我發現，我參加過的聚會中，我最喜歡的，往往也都是最單純、最真實的。

一杯調酒、一小群人、一場桌遊。
然後大家一起笑到瘋掉。

活動結束後，我連對方的名字都不知道，當下卻感覺無比充實。

我才意識到，原來我渴望的也不一定是一個生死之交，只是一個有「歸屬感」的地方而已。

於是我決定，我要復刻這樣的場域。
「深度圈」就這麼誕生了。

如果你好奇我們的聚會是什麼樣子，歡迎你填寫主頁的入會報名表單，我們會把「邀請函」發送給你，歡迎你親自來看看。">
